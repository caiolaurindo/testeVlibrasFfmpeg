<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Conversor Libras IA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 700px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            margin-right: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 15px;
            color: #444;
            font-size: 14px;
        }

        .recording {
            background: red !important;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }

        #dl {
            display: none;
            margin-top: 20px;
            display: inline-block;
            font-weight: bold;
            color: green;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="panel">

        <h2>🎬 Conversor SRT → Libras IA</h2>

        <input type="file" id="fileInput" accept=".srt">

        <br><br>

        <button onclick="carregarSRT()">
            📁 Carregar SRT
        </button>

        <button id="btnRec" onclick="iniciarProcesso()">
            ⏺ Gerar Vídeo
        </button>

        <br>

        <a id="dl" download="avatar_realista.mp4">
            ⬇ Baixar MP4
        </a>

        <div id="status">
            Aguardando arquivo...
        </div>

    </div>

    <!-- VLibras -->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>

        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

    <script>

        new window.VLibras.Widget(
            'https://vlibras.gov.br/app'
        );

        let glossas = [];
        let recorder;
        let chunks = [];
        let timeouts = [];

        // =====================================================
        // SRT → MS
        // =====================================================

        function srtToMs(time) {

            const [main, ms] = time.split(',');

            const [h, m, s] = main.split(':');

            return (
                parseInt(h) * 3600000 +
                parseInt(m) * 60000 +
                parseInt(s) * 1000 +
                parseInt(ms)
            );
        }

        // =====================================================
        // STATUS
        // =====================================================

        function setStatus(text) {

            document.getElementById(
                'status'
            ).innerText = text;
        }

        // =====================================================
        // LOAD SRT
        // =====================================================

        async function carregarSRT() {

            const file =
                document.getElementById(
                    'fileInput'
                ).files[0];

            if (!file) {

                alert("Selecione um SRT.");

                return;
            }

            const text = await file.text();

            setStatus("📄 Processando SRT...");

            try {

                const response = await fetch(
                    'http://localhost:5000/processar',
                    {
                        method: 'POST',
                        body: text
                    }
                );

                glossas = await response.json();

                console.log(glossas);

                setStatus(
                    `✅ ${glossas.length} legendas carregadas`
                );

            } catch (err) {

                console.error(err);

                setStatus(
                    "❌ Erro ao conectar no backend"
                );
            }
        }

        // =====================================================
        // ESPERA VLibras
        // =====================================================

        function esperarVLibras() {

            return new Promise((resolve) => {

                const interval = setInterval(() => {

                    if (
                        window.plugin &&
                        window.plugin.player &&
                        typeof window.plugin.player.translate === 'function'
                    ) {

                        clearInterval(interval);

                        resolve();
                    }

                }, 1000);

            });
        }

        // =====================================================
        // PLAY SINCRONIZADO
        // =====================================================

        async function playSincronizado() {

            await esperarVLibras();

            setStatus(
                "🤟 Avatar sinalizando..."
            );

            glossas.forEach(item => {

                const delay = srtToMs(
                    item.start
                );

                const timeout = setTimeout(() => {

                    if (
                        recorder &&
                        recorder.state === "recording"
                    ) {

                        console.log(
                            "▶",
                            item.glossa
                        );

                        window.plugin.player.translate(
                            item.glossa
                        );
                    }

                }, delay);

                timeouts.push(timeout);
            });

            // Finaliza baseado no último timestamp

            const ultimo =
                glossas[glossas.length - 1];

            const total =
                srtToMs(ultimo.end) + 3000;

            setTimeout(() => {

                pararGravacao();

            }, total);
        }

        // =====================================================
        // INICIAR PROCESSO
        // =====================================================

        async function iniciarProcesso() {

            if (glossas.length === 0) {

                alert("Carregue o SRT.");

                return;
            }

            const canvas =
                document.querySelector('canvas');

            if (!canvas) {

                alert(
                    "VLibras ainda carregando."
                );

                return;
            }

            chunks = [];

            timeouts.forEach(clearTimeout);

            timeouts = [];

            // =========================================
            // CAPTURA
            // =========================================

            const stream =
                canvas.captureStream(30);

            recorder = new MediaRecorder(
                stream,
                {
                    mimeType: 'video/webm'
                }
            );

            recorder.ondataavailable = e => {

                if (e.data.size > 0) {

                    chunks.push(e.data);
                }
            };

            recorder.onstop = enviarParaIA;

            recorder.start();

            document
                .getElementById('btnRec')
                .classList.add('recording');

            setStatus(
                "🎥 Gravando avatar..."
            );

            playSincronizado();
        }

        // =====================================================
        // STOP
        // =====================================================

        function pararGravacao() {

            if (
                recorder &&
                recorder.state === "recording"
            ) {

                recorder.stop();

                document
                    .getElementById('btnRec')
                    .classList.remove('recording');

                setStatus(
                    "⚡ Enviando para IA..."
                );
            }
        }

        // =====================================================
        // ENVIA RUNWAY
        // =====================================================

        async function enviarParaIA() {

            try {

                const blob = new Blob(
                    chunks,
                    {
                        type: 'video/webm'
                    }
                );

                const formData =
                    new FormData();

                formData.append(
                    'video',
                    blob,
                    'avatar.webm'
                );

                // =====================================
                // NOVA ROTA
                // =====================================

                const response = await fetch(
                    'http://localhost:5000/melhorar-avatar',
                    {
                        method: 'POST',
                        body: formData
                    }
                );

                if (!response.ok) {

                    const err =
                        await response.text();

                    throw new Error(err);
                }

                setStatus(
                    "⬇ Baixando vídeo final..."
                );

                const mp4 =
                    await response.blob();

                const url =
                    URL.createObjectURL(mp4);

                const dl =
                    document.getElementById('dl');

                dl.href = url;

                dl.style.display = 'inline-block';

                setStatus(
                    "✅ Vídeo finalizado!"
                );

            } catch (err) {

                console.error(err);

                setStatus(
                    "❌ Erro ao gerar vídeo IA"
                );
            }
        }

    </script>

</body>

</html>
